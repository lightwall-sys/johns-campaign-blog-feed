name: Update feed

"on":
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Update feed
        id: update
        run: python scripts/update_feed.py

      - name: Commit validated data
        shell: bash
        run: |
          set -euo pipefail
          FEED_CHANGED="$(cat .feed_changed 2>/dev/null || printf 'false')"
          DAY_OF_MONTH="$(date -u +%d)"
          if [[ "$FEED_CHANGED" != "true" && "$DAY_OF_MONTH" != "01" ]]; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/feed.json docs/status.json

          if git diff --cached --quiet; then
            exit 0
          fi

          if [[ "$FEED_CHANGED" == "true" ]]; then
            git commit -m "Update feed data"
          else
            git commit -m "Refresh feed status"
          fi
          git push

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
